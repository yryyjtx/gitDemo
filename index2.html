<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
  <script src="https://unpkg.com/vue-router/dist/vue-router.js"></script>
  <link rel="stylesheet" href="./layui/css/layui.css">
</head>

<body>
  <div id=app>
    <h1>今天天气真不错</h1>
    <router-view>

    </router-view>
  </div>
  
  <script>
    let aa={
      template:`
      <div class='a'>
        <router-link to="/news/today">今日新闻</router-link>
        <router-link to="/news/wet">今天天气</router-link>
      </div>    
        `
    }

    let b={
      template:`
      <div>
        <aa></aa>
        <router-view class='m1'></router-view>
        <router-view name='target' class='m2'></router-view>
      </div>
      `,
      components:{
        aa
      }
    }

    let c={
      template:`<h2>ccccccccccc<h2>`
    }
    let d={
      template:`<h2>dddddddddddd<h2>`
    }
    let e={
      template:`<h2>eeeeeeeeeeeeee<h2>`
    }

    let router=new VueRouter({
      mode:"history",
      routes:[
        {
          path:"/news",
          component:b,
          children:[
            {
              path:"today",
              component:c
            },
            {
              path:"wet",
              components:{
                default:d,
                target:e
              }
            }
          ]
        }
      ]
    })
    router.push("/news/today")

    new Vue({
      el:"#app",
      router,
    })

  </script>

   
</body>

</html>
